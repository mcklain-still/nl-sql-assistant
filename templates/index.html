<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat-wrapper {
            width: 700px;
            height: 600px;
            background: white;
            border-radius: 16px;
            border: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e8f4fd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .chat-header-text h2 {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .chat-header-text p {
            font-size: 12px;
            color: #888;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
            color: #555;
        }

        .message.user .message-avatar {
            background: #e8f4fd;
            color: #1a73e8;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }

        .message.bot .message-bubble {
            background: #f5f5f5;
            color: #1a1a1a;
            border-radius: 4px 16px 16px 16px;
        }

        .message.user .message-bubble {
            background: #1a73e8;
            color: white;
            border-radius: 16px 4px 16px 16px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 10px 14px;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #aaa;
            animation: bounce 1.2s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 20px 12px;
        }

        .suggestion-btn {
            font-size: 12px;
            padding: 6px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            background: white;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
        }

        .suggestion-btn:hover {
            background: #f5f5f5;
            border-color: #1a73e8;
            color: #1a73e8;
        }

        .chat-input-area {
            padding: 12px 16px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-area input:focus {
            border-color: #1a73e8;
        }

        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #1a73e8;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #1557b0;
        }

        .send-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <div class="chat-header-icon">🛍️</div>
            <div class="chat-header-text">
                <h2>Shop Bot</h2>
                <p>Ask me anything about the store</p>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="message-avatar">SB</div>
                <div class="message-bubble">
                    Hi! I'm Shop Bot. Ask me anything about our products, customers, or sales — or ask for business advice!
                </div>
            </div>
        </div>

        <div class="suggestions">
            <button class="suggestion-btn" onclick="sendSuggestion('What is our best selling product?')">Best selling product</button>
            <button class="suggestion-btn" onclick="sendSuggestion('Who is our best customer?')">Best customer</button>
            <button class="suggestion-btn" onclick="sendSuggestion('What is our total revenue?')">Total revenue</button>
            <button class="suggestion-btn" onclick="sendSuggestion('How can we grow our sales?')">Growth advice</button>
        </div>

        <div class="chat-input-area">
            <input
                type="text"
                id="userInput"
                placeholder="Ask me anything about the store..."
                onkeypress="handleKeyPress(event)"
            />
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#8593;</button>
        </div>
    </div>

    <script>
        function handleKeyPress(event) {
            if (event.key === "Enter") sendMessage();
        }

        function sendSuggestion(text) {
            document.getElementById("userInput").value = text;
            sendMessage();
        }

        function addMessage(text, sender) {
            const messages = document.getElementById("chatMessages");
            const div = document.createElement("div");
            div.className = `message ${sender}`;
            div.innerHTML = `
                <div class="message-avatar">${sender === "user" ? "You" : "SB"}</div>
                <div class="message-bubble">${text}</div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function addTypingIndicator() {
            const messages = document.getElementById("chatMessages");
            const div = document.createElement("div");
            div.className = "message bot";
            div.id = "typingIndicator";
            div.innerHTML = `
                <div class="message-avatar">SB</div>
                <div class="message-bubble">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById("typingIndicator");
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const sendBtn = document.getElementById("sendBtn");
            const message = input.value.trim();

            if (!message) return;
            if (["quit", "exit", "bye", "q"].includes(message.toLowerCase())) {
                addMessage("Thanks for visiting! Refresh the page to start a new conversation.", "bot");
                return;
            }

            addMessage(message, "user");
            input.value = "";
            sendBtn.disabled = true;
            addTypingIndicator();

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                removeTypingIndicator();
                addMessage(data.response, "bot");
            } catch (error) {
                removeTypingIndicator();
                addMessage("Sorry, something went wrong. Please try again.", "bot");
            }

            sendBtn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
